          - generic [ref=e907]:
            - generic [ref=e911]:
              - paragraph [ref=e912]: "Randy Pellegrini writes The Architecture of Survival, a 12-book epic spanning 3,200 years from Bronze Age Egypt to the AI era. The series explores genetic memory as hard science, civilizational collapse patterns, and the moral complexity of two competing philosophies: knowledge preservation versus genetic control."
              - paragraph [ref=e913]: With ~500,000 words completed and five books finished, the saga weaves real historical events with speculative elements grounded in epigenetics, network theory, and systems thinking. Each book stands alone while revealing how defensive methodology has been embedded into human civilization through every era's dominant technology.
              - paragraph [ref=e914]: When not writing, Randy travels near and far to better imagine history up close and personal. He continuously wonders why we continue to replay broken patterns of human systems. That wonder was the seed that has grown into this series.
