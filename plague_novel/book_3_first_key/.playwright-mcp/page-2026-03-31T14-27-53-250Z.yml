    - generic [ref=e808]:
      - separator [ref=e809]
      - heading "From the Publisher" [level=2] [ref=e810]
      - generic [ref=e813]:
        - generic [ref=e815]:
          - 'heading "Where the Conspiracy Began: Bronze Age Egypt, 1177 BCE" [level=3] [ref=e817]'
          - paragraph [ref=e819]: "Civilizations don't just collapse. Someone has to let them. In 1177 BCE, the Bronze Age world is dying. The Mycenaeans are gone. The Hittites are ash. Refugees flood into Egypt's last great city, Pi-Ramesses, carrying diseases that overwhelm every physician's knowledge. Nefertari, a healer trained at the Per Ankh medical school, notices something no one else sees: patterns in how bloodlines carry traits across generations. Children of scribes learn symbols faster. Famine survivors pass weakness to their children even when fed. Something invisible is being transmitted through blood itself. When a dying scholar entrusts Nefertari with a discovery that explains the collapse — not as random catastrophe, but as the result of deliberate manipulation — she faces an impossible choice. The knowledge is too dangerous to share and too important to destroy. So she does something unprecedented: she scatters it across a network of carriers, encoded in ways that only future generations can reassemble. That single decision echoes across eight centuries. From Nefertari's Egypt through the courts of Israel, the exile in Babylon, the oracle networks of Greece, and the wars of Persia, one bloodline carries fragments of the original truth. Each generation inherits a piece they don't fully understand. Each faces the same enemy: an organization that believes humanity's survival requires control, not freedom. The First Key spans 842 years and follows the women who built the defensive network that Thomas of Eltville would later discover in The Aethelred Cipher and Sarah Chen would inherit in The Genesis Protocol. This is the origin story — not just of the conspiracy, but of the idea that knowledge preserved in human blood might be the only thing that survives when everything else burns. Perfect for readers who love the historical scope of James Clavell, the conspiracy depth of Umberto Eco, and the scientific grounding of Neal Stephenson. Book 3 of The Architecture of Survival — a 12-book epic spanning 3,200 years from Bronze Age Egypt to the modern era."
        - generic [ref=e821]:
          - heading "From the Author" [level=3] [ref=e823]
          - paragraph [ref=e825]: "I wrote The Aethelred Cipher and The Genesis Protocol knowing they were the middle and end of a much bigger story. Readers kept asking the same question: where did the conspiracy start? Who built the defensive network? Why? The First Key is my answer. And writing it broke my brain in the best possible way. I had to go back to the Bronze Age Collapse — one of the most catastrophic and least understood events in human history. Around 1177 BCE, nearly every major civilization in the Mediterranean world collapsed within a few decades. The Mycenaeans, Hittites, Ugarit, the Kassite Babylonians — all gone. Historians still argue about why. I wanted to explore what it would feel like to live through that, to watch the entire known world fall apart and try to preserve something worth saving. Nefertari became my way in. A physician in Pi-Ramesses, trained in the most advanced medical tradition of the ancient world, she notices patterns in how traits pass through bloodlines — observations that wouldn't be formally understood for another three thousand years. She's not a warrior or a queen. She's a healer who sees something no one else sees, and that vision becomes the seed of everything that follows. The hardest part was writing across 842 years. Each chapter follows a different woman in the same bloodline, inheriting fragments of knowledge they don't fully understand, facing an enemy that keeps evolving. I wanted each chapter to feel like its own complete story while building toward something larger. This is the prequel, but I wrote it third for a reason. You need to know what the network becomes before you can appreciate how it started — in a single decision by one physician who refused to let knowledge die with her. — Randy Pellegrini"
