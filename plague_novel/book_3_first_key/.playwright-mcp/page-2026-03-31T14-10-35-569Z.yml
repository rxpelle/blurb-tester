                    - text: Sarah Chen received a message from a Linda Marsh, that she has some important information on GeneVault’s genetic research. VERY important! Sarah needs to come now. But when she gets to Linda Marsh’s house, it’s on fire. She can smell kerosene. The fire was intentional. She sees the body of Linda on the floor and tries to save her. She’s holding a box. In the box, Sarah will find a flash drive, a key and a note.
                    - text: I’m not fully describing the first chapter as there is more and it’s intense. But it’s the start of a conspiracy of people that want to control humanities DNA. They want to kill 4 billion people whose genetic code they want eliminated. Why? What are they trying to achieve in the long run?
                    - text: Sarah breaks into Yale’s Sterling Memorial Library at night. She goes looking for a document that has info on a Defensive Protocol. “…Nefertari’s intention to PREVENT collapse, not engineer survival…” There she meets Dr. Maya Chen. CDC Emerging Infectious Diseases division. Dr. Maya noticed Genetic markers for plague resistance appearing in populations that shouldn’t have them. Pre-dating the selective pressure by centuries.
                    - text: The conspiracy grows wider and has existed for much of human history. There is another group though. People make desperate decisions. Some die, some change, some fail. Billions of lives are at stake. A plan to kill more than half of humanity. A claim that only by killing half will the human species survive – but that claim doesn’t look at the full facts.
                    - text: I’d like to tell you more. The book is so much more than I’ve told you, but that would spoil. I’m not going to give away spoilers. So why, who, will they win? Read the book. Decide for yourself what you think of it. Myself, I enjoyed it. Conspiracy, mystery, science meeting science fiction, it’s all there and more. Myself? I enjoyed the book. Read and decide for yourself.
