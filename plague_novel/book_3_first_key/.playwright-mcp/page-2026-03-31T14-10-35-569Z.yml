        - generic [ref=e564]:
          - paragraph [ref=e565]: A geneticist discovers that the greatest threat to humanity was engineered by the people claiming to protect it.
          - paragraph [ref=e566]: When Dr. Sarah Chen is recruited to consult on a classified intelligence operation, she expects government bureaucracy and national security theater. What she finds instead is THRESHOLD — a bioweapons program spanning forty-seven cities across six continents, designed to deploy an engineered pathogen capable of killing four billion people.
          - paragraph [ref=e567]: The program wasn't built by a rogue state or a terrorist cell. It was built by GenVault, the world's most powerful pharmaceutical corporation — and behind GenVault stands the Order, a secret organization that has been shaping human genetics for three thousand years. They don't see THRESHOLD as a weapon. They see it as a correction. A genetic reset designed to save our species from itself.
          - paragraph [ref=e568]: "Sarah has nine days to stop the deployment. Her only allies: a defecting physicist haunted by the weapon he helped design, an intelligence officer running out of authorized options, and a retired health inspector in Lisbon who built something no one expected — a distributed defense network of ordinary people positioned to dismantle the most sophisticated bioweapons infrastructure ever constructed."
          - paragraph [ref=e569]: "But stopping the countdown is only the beginning. When a containment breach unleashes the pathogen, Sarah is forced to confront an impossible equation: the corporation that engineered the outbreak is the only entity capable of developing the cure. Exposing the truth means destroying the vaccine. Justice and survival cannot coexist."
          - paragraph [ref=e570]: The math says silence saves more lives than truth. Sarah believes the math. She doesn't accept it — which is different, and worse.
          - paragraph [ref=e571]: The Genesis Protocol is the second book in The Architecture of Survival series.
