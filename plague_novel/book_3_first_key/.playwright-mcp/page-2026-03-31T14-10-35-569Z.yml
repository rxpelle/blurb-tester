    - generic [ref=e975]:
      - separator [ref=e976]
      - heading "From the Publisher" [level=2] [ref=e977]
      - generic [ref=e980]:
        - generic [ref=e982]:
          - heading "A Genetic Conspiracy Three Millennia in the Making" [level=3] [ref=e984]
          - paragraph [ref=e986]: "What if your DNA carried secrets that could reshape humanity — or destroy it? Dr. Sarah Chen thought she was investigating routine genetic anomalies at GenVault Corporation. Instead, she uncovered humanity's most dangerous secret: a bioweapon engineered not in months or years, but across three thousand years of careful manipulation. With forty-three seconds to escape GenVault's collapsing containment protocols, Sarah becomes the most hunted woman on Earth. Her crime? Discovering that her own genetic code carries the memories of 82 generations — a living archive that two shadow organizations will kill to possess. The Defensive Network has protected carriers like Sarah for millennia, operating in the spaces between governments and corporations. The Order has spent just as long trying to weaponize what flows through their veins. Now both sides converge on Sarah, who holds the key to either humanity's evolution or its extinction. As Sarah races through a world where every hospital, every genetic testing facility, every drop of blood becomes a potential weapon, she must decode not just her own genetic memory, but the impossible mathematics that have kept this conspiracy hidden. Each revelation pulls her deeper into a web of connections spanning ancient bloodlines, modern biotech, and the classified pandemic protocols that governments hoped they'd never need. From the laboratories of GenVault to the shadow networks protecting genetic carriers, every page pulses with authentic scientific detail and relentless tension. Perfect for readers who devoured The Andromeda Strain, Dark Matter, and The Genesis Machine. Book 2 of The Architecture of Survival — a 12-book epic spanning 3,200 years from Bronze Age Egypt to the modern era. Some genetic codes are meant to be broken. Others are meant to survive. Sarah Chen is about to discover which kind she carries."
        - generic [ref=e988]:
          - heading "From the Author" [level=3] [ref=e990]
          - paragraph [ref=e992]: "The Genesis Protocol started with a question I couldn't shake: what if the most important information in human history wasn't stored in libraries or databases, but in our cells? I'd spent years researching genetic memory and epigenetic inheritance for The Aethelred Cipher, and the deeper I went, the more the science blurred into something that felt like science fiction. Except it wasn't fiction — researchers are genuinely discovering that trauma, knowledge, and behavioral patterns can be passed down through DNA across generations. The implications are staggering. Sarah Chen came to life because I wanted to explore what happens when that science collides with conspiracy. What if someone discovered that their genetic code carried not just ancestral memories, but evidence of deliberate manipulation spanning millennia? And what if the organizations behind that manipulation were still operating today? This is the second book in The Architecture of Survival series, and it shifts the timeline forward from medieval Germany to the modern era. The same conspiracy Thomas of Eltville uncovered in The Aethelred Cipher is still running — but now it's operating through biotech corporations, genetic testing facilities, and classified pandemic protocols. The tools have changed. The stakes haven't. Writing Sarah's story meant diving deep into genetics, bioweapons research, and network theory. I wanted every scientific detail to feel authentic, even when the conspiracy surrounding it pushes into thriller territory. If you've ever wondered what secrets might be hiding in your family's DNA, this book is for you. The series spans 3,200 years and 12 books. Each one stands alone as a thriller, but together they tell the story of how one organization has shaped human civilization from the shadows — and what happens when ordinary people start pushing back. — Randy Pellegrini"
