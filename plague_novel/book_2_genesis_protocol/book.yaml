title: "The Genesis Protocol"
author: "Randy Pellegrini"
genre: "Science Thriller"
series_name: "The Architecture of Survival"
blurb: >
  Yale epidemiologist Sarah Chen uncovers a biotech conspiracy that's been engineering
  human survival for decades — by deciding who lives and who dies. When she infiltrates
  GenVault's global network of genetic research hubs, she discovers THRESHOLD: a program
  designed to release a targeted pathogen that will kill millions but ensure humanity's
  long-term survival. Sarah secures 46 of 47 hubs. But the one that escapes triggers a
  global pandemic. Now Sarah must navigate classified NDAs, institutional cover-ups, and
  a fugitive architect planning the next deployment — while carrying a truth she can never
  speak aloud. 35 million dead. 4 billion saved. And the woman who engineered it all is
  still out there, planning 2040.
comp_titles:
  - "The Andromeda Strain by Michael Crichton"
  - "Dark Matter by Blake Crouch"
  - "The Stand by Stephen King"
  - "Recursion by Blake Crouch"
